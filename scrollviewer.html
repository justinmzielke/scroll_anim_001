<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Animation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background: transparent;
            scrollbar-width: none;
            overflow-y: scroll;
            overflow-x: hidden;
        }
        body::-webkit-scrollbar {
            display: none;
        }
        ::-webkit-scrollbar {
            display: none;
        }
        .scroll-container { 
            height: 500vh; 
            width: 100%;
        }
        .viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            overflow: hidden;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>
    <div class="scroll-container"></div>
    <div class="viewer">
        <img id="frame" src="https://justinmzielke.github.io/scroll_anim_001/placeholder.jpg" style="display: block;">
    </div>

    <script>
        const IMAGE_DIR = 'https://justinmzielke.github.io/scroll_anim_001/images_optimized';
        const START_FRAME = 175;
        const TOTAL_FRAMES = 100;
        
        let frames = [];
        let current = -1;
        let displayFrame = 0;
        let velocity = 0;
        let animating = false;
        let scrollTimeout;
        let isActuallyScrolling = false;
        
        async function load() {
            for (let i = 0; i < 25 && i < TOTAL_FRAMES; i++) {
                const num = String(START_FRAME + i).padStart(4, '0');
                const url = `${IMAGE_DIR}/EarthlyMarkers002_03fusionrender${num}.jpg`;
                try {
                    const r = await fetch(url, { mode: 'cors' });
                    if (r.ok) frames[i] = URL.createObjectURL(await r.blob());
                } catch(e) { console.error(`Frame ${num} failed`); }
            }
            show(0);
            for (let i = 25; i < TOTAL_FRAMES; i++) {
                const num = String(START_FRAME + i).padStart(4, '0');
                const url = `${IMAGE_DIR}/EarthlyMarkers002_03fusionrender${num}.jpg`;
                fetch(url, { mode: 'cors' })
                    .then(r => r.ok ? r.blob() : null)
                    .then(blob => { if (blob) frames[i] = URL.createObjectURL(blob); })
                    .catch(e => console.error(`Frame ${num} failed`));
            }
        }
        
        function show(i) {
            i = Math.max(0, Math.min(Math.round(i), TOTAL_FRAMES - 1));
            if (i === current || !frames[i]) return;
            document.getElementById('frame').src = frames[i];
            current = i;
        }
        
        let lastFrameTime = 0;
        const FRAME_INTERVAL = 1000 / 12;
        let scrollAccumulator = 0;
        let lastScrollEvent = 0;
        let lastScrollY = 0;
        
        function animate() {
            const now = Date.now();
            if (now - lastFrameTime >= FRAME_INTERVAL) {
                if (!isActuallyScrolling) {
                    displayFrame += velocity;
                    displayFrame = Math.max(0, Math.min(displayFrame, TOTAL_FRAMES - 1));
                    show(displayFrame);
                    velocity *= 0.85;
                    lastFrameTime = now;
                }
            }
            if (!isActuallyScrolling && Math.abs(velocity) > 0.001) {
                requestAnimationFrame(animate);
            } else if (isActuallyScrolling) {
                requestAnimationFrame(animate);
            } else {
                animating = false;
                velocity = 0;
            }
        }
        
        window.addEventListener('scroll', () => {
            if (!frames.length) return;
            const now = Date.now();
            if (now - lastFrameTime < FRAME_INTERVAL) return;
            const scrollPos = window.scrollY;
            const scrollDelta = scrollPos - lastScrollY;
            lastScrollY = scrollPos;
            const h = document.documentElement.scrollHeight - window.innerHeight;
            const framesDelta = (scrollDelta / h) * (TOTAL_FRAMES - 1);
            if (Math.abs(framesDelta) > 0.01) {
                scrollAccumulator += framesDelta;
                if (now - lastScrollEvent > 150) scrollAccumulator = framesDelta;
                velocity = scrollAccumulator * 0.6;
            }
            displayFrame += velocity;
            displayFrame = Math.max(0, Math.min(displayFrame, TOTAL_FRAMES - 1));
            show(displayFrame);
            lastScrollEvent = now;
            lastFrameTime = now;
            isActuallyScrolling = true;
            clearTimeout(scrollTimeout);
            if (!animating) {
                animating = true;
                requestAnimationFrame(animate);
            }
            scrollTimeout = setTimeout(() => {
                isActuallyScrolling = false;
                scrollAccumulator = 0;
            }, 50);
        }, { passive: true });
        
        load();
    </script>
</body>
</html>
